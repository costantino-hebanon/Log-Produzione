<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Genera Icone — LOG Produzione</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f1f5f9; gap: 24px; }
    h2 { color: #1e293b; margin: 0; }
    p { color: #64748b; margin: 0; text-align: center; }
    canvas { border-radius: 22%; box-shadow: 0 8px 32px #0003; }
    .buttons { display: flex; gap: 12px; }
    button { background: #1e293b; color: white; border: none; padding: 12px 24px; border-radius: 10px; font-size: 15px; cursor: pointer; font-weight: 600; }
    button:hover { background: #334155; }
    code { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  </style>
</head>
<body>
  <h2>Genera Icone — LOG Produzione</h2>
  <canvas id="preview" width="192" height="192"></canvas>
  <div class="buttons">
    <button onclick="download(192)">📥 icon-192.png</button>
    <button onclick="download(512)">📥 icon-512.png</button>
  </div>
  <p>Salva entrambe in <code>public/</code>, poi fai git push.</p>

  <script>
    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Sfondo arrotondato slate-800
      const r = size * 0.22;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = '#1e293b';
      ctx.fill();

      // Emoji 📋
      ctx.font = `${size * 0.56}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('📋', size / 2, size / 2 + size * 0.02);

      return canvas;
    }

    // Anteprima
    const preview = document.getElementById('preview');
    const previewCtx = preview.getContext('2d');
    const drawn = drawIcon(192);
    previewCtx.drawImage(drawn, 0, 0);

    function download(size) {
      const canvas = drawIcon(size);
      const a = document.createElement('a');
      a.download = `icon-${size}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
